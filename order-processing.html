<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>POS - Glins Cravings</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .dashboard-container {
            width: 1100px;
            height: 650px; 
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .nav-controls {
            display: flex;
            align-items: center;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.2);
            border-bottom: 1px solid rgba(0,0,0,0.1);
        }

        .pos-wrapper {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 15px;
            padding: 15px;
            flex: 1;
            min-height: 0;
        }

        .menu-container, .billing-panel {
            background: white;
            border: 2px solid #000;
            border-radius: 20px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .scroll-grid {
            overflow-y: auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 10px;
        }

        #order-list {
            flex: 1;
            overflow-y: auto;
            margin: 10px 0;
            min-height: 0;
        }

        .checkout-section {
            border-top: 2px solid #000;
            padding-top: 10px;
        }

        .product-card {
            background: #fff;
            border: 1px solid #000;
            padding: 10px;
            border-radius: 10px;
            text-align: center;
            font-size: 11px;
            font-weight: 800;
            cursor: pointer;
            transition: 0.2s;
        }

        .product-card:hover { background: #fce4ec; transform: scale(1.02); }

        .product-card:active {
    transform: scale(0.95);
    background-color: #B86B77;
    color: white;
}

        .back-btn {
            background: #000;
            color: white;
            padding: 8px 15px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 800;
            font-size: 13px;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .cart-row {
            display:flex; 
            justify-content:space-between; 
            align-items:center; 
            padding:5px 0; 
            border-bottom:1px dashed #eee; 
            font-size:12px;
        }

        @keyframes fadeIn {
    from { opacity: 0; transform: translateX(10px); }
    to { opacity: 1; transform: translateX(0); }
}
.cart-row {
    animation: fadeIn 0.3s ease-out;
}
    </style>
</head>
<body>

    <div class="dashboard-container">
        <div class="dash-header">
            <img src="logo.png" alt="Logo" class="dash-logo">
            <h1 class="dash-title">Order Processing</h1>
        </div>

        <div class="nav-controls">
            <a href="admin-dashboard.html" class="back-btn">
                <i class="fa-solid fa-arrow-left"></i> BACK TO DASHBOARD
            </a>
        </div>

        <div class="pos-wrapper">
            <div class="menu-container">
                <h3 style="margin:0 0 10px 0;">Menu Selection</h3>
                <div class="scroll-grid">
                    <div class="product-card" onclick="add(101, 'Carbonara Buldak', 109)">Carbonara Buldak<br>₱109</div>
                    <div class="product-card" onclick="add(102, 'Cheese Buldak', 109)">Cheese Buldak<br>₱109</div>
                    <div class="product-card" onclick="add(103, 'Mozza Corndog', 75)">Mozza Corndog<br>₱75</div>
                    <div class="product-card" onclick="add(104, 'Potato Corndog', 85)">Potato Corndog<br>₱85</div>
                    <div class="product-card" onclick="add(105, 'Buttered Corn', 45)">Buttered Corn<br>₱45</div>
                    <div class="product-card" onclick="add(106, 'Strawberry Milk', 59)">Strawberry Milk<br>₱59</div>
                    <div class="product-card" onclick="add(107, 'Melon Gulaman', 30)">Melon Gulaman<br>₱30</div>
                    <div class="product-card" onclick="add(108, 'Special Turon', 25)">Special Turon<br>₱25</div>
                </div>
            </div>

            <div class="billing-panel">
                <div style="background:#fdf2f2; padding:8px; border-radius:10px; border:1px solid #B86B77;">
                    <label style="font-size:10px; font-weight:800;">CUSTOMER NAME</label>
                    <input type="text" id="custName" name="customer_name" placeholder="Guest" style="width:90%; padding:5px; border:1px solid #ccc; border-radius:5px;">
                </div>

                <div id="order-list">
                    <p style="text-align:center; color:#999; font-size:12px; margin-top:20px;">- No Items -</p>
                </div>

                <div class="checkout-section">
                    <div style="display:flex; justify-content:space-between; font-size:20px; font-weight:900; color:#B86B77;">
                        <span>TOTAL</span>
                        <span id="total-val">₱0.00</span>
                    </div>
                    
                    <button class="action-btn" style="width:100%; height:45px; background:#28a745; color:white; margin-top:10px; border:2px solid #000; border-radius:12px; cursor:pointer;" onclick="completeSale()">
                        COMPLETE SALE
                    </button>
                    
                    <button class="action-btn" style="width:100%; margin-top:5px; background:#666; color:white; font-size:11px; border:2px solid #000; border-radius:12px; cursor:pointer;" onclick="clearAll()">
                        CLEAR ALL
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let total = 0;
        let cartItems = [];

        // Updated function to accept "id"
        function add(id, name, price) {
            cartItems.push({ id, name, price });
            renderCart();
        }

        function renderCart() {
            const list = document.getElementById('order-list');
            list.innerHTML = '';
            total = 0;

            if (cartItems.length === 0) {
                list.innerHTML = '<p style="text-align:center; color:#999; font-size:12px; margin-top:20px;">- No Items -</p>';
                document.getElementById('total-val').innerText = '₱0.00';
                return;
            }

            cartItems.forEach((item, index) => {
                const row = document.createElement('div');
                row.className = 'cart-row';
                row.innerHTML = `
                    <span>${item.name}</span>
                    <div>
                        <span style="margin-right:8px;">₱${item.price}</span>
                        <i class="fa-solid fa-circle-xmark" style="color:#ff4d4d; cursor:pointer;" onclick="removeItem(${index})"></i>
                    </div>
                `;
                list.appendChild(row);
                total += item.price;
            });
            document.getElementById('total-val').innerText = `₱${total.toFixed(2)}`;
        }

        function removeItem(index) {
            cartItems.splice(index, 1);
            renderCart();
        }

        function clearAll() {
            if(cartItems.length > 0 && confirm("Clear entire order?")) {
                cartItems = [];
                renderCart();
            }
        }

        // BACKEND READY FUNCTION
        function completeSale() {
            if(cartItems.length === 0) return alert("Add items first!");

            // This is the data object your programmers will use
            const finalOrder = {
                customerName: document.getElementById('custName').value || "Guest",
                orderTime: new Date().toLocaleTimeString(),
                itemsPurchased: cartItems, // Contains IDs, Names, and Prices
                totalAmount: total
            };

            // This prints the data in the browser console for your programmers to see
            console.log("SENDING DATA TO BACKEND:", finalOrder);

            alert("Transaction for " + finalOrder.customerName + " Saved! (Check Console for Data)");
            
            // Reset for next customer
            cartItems = [];
            document.getElementById('custName').value = '';
            renderCart();
        }
    </script>
</body>
</html>
