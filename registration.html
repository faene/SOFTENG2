<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glins Cravings - Registration</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Roboto', sans-serif;
        }

        body {
            background: linear-gradient(to bottom, #EABFB9 0%, #B86B77 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .split-window {
            display: flex;
            width: 950px;
            height: 600px;
            background-color: #EABFB9;
            border: 1px solid #000;
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .panel-left {
            flex: 1;
            background: linear-gradient(to bottom, #EABFB9, #B86B77);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px;
        }

        .panel-right {
            flex: 1.3;
            background-color: #EABFB9;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .form-container {
            background-color: #d99e9e;
            padding: 30px;
            border-radius: 20px;
            border: 1px solid #000;
            width: 85%;
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
            box-shadow: 2px 4px 10px rgba(0,0,0,0.1);
        }

        .input-group {
            background: white;
            padding: 10px 15px;
            border-radius: 12px;
            border: 1px solid #000;
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
            box-shadow: 0 4px 4px rgba(0,0,0,0.15);
        }

        .input-group i {
            color: #333;
            width: 20px;
            text-align: center;
        }

        .input-group input, .input-group select {
            border: none;
            outline: none;
            width: 100%;
            font-size: 16px;
            font-weight: 600;
            background: transparent;
        }

        .action-btn {
            width: 200px;
            padding: 12px;
            margin-top: 10px;
            background-color: #B86B77;
            border: 1px solid #000;
            border-radius: 15px;
            cursor: pointer;
            font-weight: 800;
            font-size: 16px;
            box-shadow: 0 4px 4px rgba(0,0,0,0.25);
            transition: 0.2s;
        }

        .action-btn:hover {
            filter: brightness(90%);
        }

        .side-btn {
            background: transparent;
            margin-top: 20px;
        }

        .welcome-title { font-size: 32px; font-weight: 800; margin-bottom: 10px; }
        .form-title { font-size: 40px; font-weight: 800; margin-bottom: 20px; }
        .logo-placeholder { width: 100px; height: 100px; border-radius: 50%; margin-bottom: 20px; border: 2px solid #000; background-color: #fff; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div class="split-window">
        <div class="panel-left">
            <div class="logo-placeholder">
                <img src="logo.png" alt="Logo" style="width: 80px;">
            </div>
            <h1 class="welcome-title">Welcome to<br>Glins Cravings!</h1>
            <p>Already have an account?<br>Sign in to get started</p>
            <button class="action-btn side-btn" onclick="location.href='login.html'">Sign in</button>
        </div>

        <div class="panel-right">
            <h1 class="form-title">Create Account</h1>
            <div class="form-container">
                <div class="input-group">
                    <i class="fa-solid fa-address-card"></i>
                    <input type="text" placeholder="Enter Full Name">
                </div>
                <div class="input-group">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" placeholder="Enter Username">
                </div>
                <div class="input-group">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" placeholder="Enter Password">
                </div>
                <div class="input-group">
                    <i class="fa-solid fa-cog"></i>
                    <select>
                        <option value="" disabled selected>Role</option>
                        <option value="user">User</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>
                <button class="action-btn">Sign up</button>
            </div>
        </div>
    </div>

</body>
</html>
