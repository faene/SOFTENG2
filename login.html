<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Glins Cravings - Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Roboto', sans-serif; font-weight: 600; }
        body { background: linear-gradient(to bottom, #EABFB9 0%, #B86B77 100%); height: 100vh; display: flex; justify-content: center; align-items: center; }
        .split-window { display: flex; width: 950px; height: 600px; background-color: #EABFB9; border: 1px solid #000; border-radius: 30px; overflow: hidden; }
        .panel-left { flex: 1.3; background-color: #EABFB9; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .panel-right { flex: 1; background: linear-gradient(to bottom, #EABFB9, #B86B77); display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 40px; }
        .form-box { background-color: #d99e9e; padding: 35px 25px; border-radius: 20px; border: 1px solid #000; width: 85%; display: flex; flex-direction: column; gap: 20px; align-items: center; }
        .input-capsule { background: white; padding: 12px 20px; border-radius: 15px; border: 1px solid #000; width: 100%; box-shadow: 0 4px 4px rgba(0,0,0,0.1); }
        .input-capsule input { border: none; outline: none; width: 100%; font-size: 16px; font-weight: 600; }
        .action-btn { width: 200px; padding: 12px; background-color: #B86B77; border: 1px solid #000; border-radius: 15px; cursor: pointer; font-weight: 800; box-shadow: 0 4px 4px rgba(0,0,0,0.25); }
        .welcome-text { font-size: 40px; font-weight: 800; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="split-window">
        <div class="panel-left">
            <h1 style="font-size: 48px; margin-bottom: 20px;">Sign in</h1>
            <div class="form-box">
                <div class="input-capsule"><input type="text" placeholder="Username"></div>
                <div class="input-capsule"><input type="password" placeholder="Password"></div>
                <button class="action-btn">Login</button>
                <a href="forgot-password.html" style="font-size: 14px; align-self: flex-end; color: black; text-decoration: none;">Forgot Password?</a>
            </div>
        </div>
        <div class="panel-right">
            <h1 class="welcome-text">Hello, Glins<br>Craver!</h1>
            <p>Do not have an account?<br>Sign up to create one.</p>
            <button class="action-btn" style="background-color: transparent; margin-top: 20px;" onclick="location.href='registration.html'">Sign up</button>
        </div>
    </div>
</body>
</html>
